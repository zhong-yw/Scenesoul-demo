<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白界 · Scenesoul</title>
    <style>
        :root {
            --bg-deep: #06060f;
            --bg-surface: #0c0c1d;
            --bg-card: #12122a;
            --bg-hover: #1a1a3a;
            --border: #1e1e40;
            --border-light: #2a2a55;
            --text-primary: #e8e8f0;
            --text-secondary: #9090b0;
            --text-muted: #606080;
            --accent-purple: #a78bfa;
            --accent-blue: #60a5fa;
            --accent-green: #6ee7b7;
            --accent-amber: #fbbf24;
            --accent-rose: #fb7185;
            --narrator-bg: #0d1a15;
            --narrator-border: #1a3a2a;
            --narrator-text: #6ee7b7;
            --thought-border: #2a2a50;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --shadow-glow: 0 0 20px rgba(167, 139, 250, 0.08);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                         'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 顶部导航 ── */
        .topbar {
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        .topbar::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
            opacity: 0.3;
        }
        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar-brand .logo {
            width: 28px; height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .topbar-brand h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        .topbar-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .scene-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 13px;
            color: var(--accent-purple);
            transition: var(--transition);
        }
        .scene-badge .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar-actions button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .topbar-actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-light);
        }

        /* ── 主体布局 ── */
        .layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── 聊天区 ── */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* 消息流 */
        .message-stream {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .message-stream::-webkit-scrollbar { width: 5px; }
        .message-stream::-webkit-scrollbar-track { background: transparent; }
        .message-stream::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }
        .message-stream::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* 消息气泡 */
        .msg {
            max-width: 72%;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            line-height: 1.7;
            font-size: 14px;
            position: relative;
            animation: msgIn 0.35s ease-out;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #3730a3, #4338ca);
            border-bottom-right-radius: 4px;
            color: #f0f0ff;
        }
        .msg.brain {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-bottom-left-radius: 4px;
        }
        .msg.thought {
            align-self: center;
            max-width: 60%;
            background: transparent;
            border: 1px dashed var(--thought-border);
            color: var(--text-muted);
            font-size: 13px;
            font-style: italic;
            text-align: center;
            padding: 10px 20px;
        }
        .msg.narrator {
            align-self: flex-start;
            max-width: 80%;
            background: var(--narrator-bg);
            border: 1px solid var(--narrator-border);
            color: var(--narrator-text);
            border-bottom-left-radius: 4px;
            font-size: 13px;
            line-height: 1.8;
        }

        .msg-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .msg.user .msg-label { color: #c4b5fd; }
        .msg.brain .msg-label { color: var(--accent-purple); }
        .msg.narrator .msg-label { color: #34d399; }
        .msg.thought .msg-label { color: var(--text-muted); }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 6px;
            text-align: right;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .msg:hover .msg-time { opacity: 1; }

        /* 思考指示器 */
        .thinking-indicator {
            align-self: flex-start;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--text-secondary);
            animation: msgIn 0.3s ease-out;
        }
        .thinking-indicator.active { display: flex; }
        .thinking-dots span {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent-purple);
            animation: dotBounce 1.4s infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        /* 输入区 */
        .input-bar {
            padding: 16px 24px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 4px 4px 4px 20px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .input-wrapper:focus-within {
            border-color: var(--accent-purple);
            box-shadow: var(--shadow-glow);
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            padding: 10px 0;
        }
        .input-wrapper input::placeholder { color: var(--text-muted); }
        .input-wrapper .send-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, opacity 0.2s;
            flex-shrink: 0;
        }
        .input-wrapper .send-btn:hover { transform: scale(1.05); }
        .input-wrapper .send-btn:active { transform: scale(0.95); }
        .input-wrapper .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            padding-left: 20px;
        }

        /* ── 右侧面板 ── */
        .side-panel {
            width: 300px;
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            transition: width var(--transition);
        }
        .side-panel.collapsed { width: 0; border: none; }

        .side-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .side-scroll::-webkit-scrollbar { width: 4px; }
        .side-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .panel-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            transition: border-color var(--transition);
        }
        .panel-card:hover { border-color: var(--border-light); }
        .panel-card-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-card-title .icon { font-size: 14px; }

        /* 场景卡片 */
        .scene-display {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .scene-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 驱动力条 */
        .drive-item {
            margin-bottom: 10px;
        }
        .drive-item:last-child { margin-bottom: 0; }
        .drive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .drive-name {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .drive-value {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        .drive-track {
            height: 4px;
            background: var(--bg-deep);
            border-radius: 2px;
            overflow: hidden;
        }
        .drive-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 2px;
        }

        /* 最后思绪 */
        .last-thought {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            font-style: italic;
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .world-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .world-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .world-row .name {
            color: var(--text-primary);
            font-weight: 500;
        }
        .world-row .meta {
            color: var(--text-muted);
            font-size: 11px;
        }
        .world-changes {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
            max-height: 84px;
            overflow: hidden;
        }

        /* 状态指示 */
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 0;
        }
        .status-dot-sm {
            width: 6px; height: 6px;
            border-radius: 50%;
        }
        .status-dot-sm.online { background: var(--accent-green); }
        .status-dot-sm.offline { background: var(--text-muted); }

        /* ── 响应式 ── */
        @media (max-width: 900px) {
            .side-panel { display: none; }
            .msg { max-width: 88%; }
        }
        @media (max-width: 600px) {
            .topbar { padding: 0 12px; }
            .topbar-center { display: none; }
            .message-stream { padding: 16px 12px; }
            .input-bar { padding: 12px; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="topbar">
        <div class="topbar-brand">
            <div class="logo">白</div>
            <h1>白界 · Scenesoul</h1>
        </div>
        <div class="topbar-center">
            <div class="scene-badge">
                <span class="dot"></span>
                <span id="sceneDisplay">加载中…</span>
            </div>
        </div>
        <div class="topbar-actions">
            <button onclick="togglePanel()" title="切换面板">面板</button>
        </div>
    </div>

    <!-- 主体 -->
    <div class="layout">
        <!-- 聊天区 -->
        <div class="chat-panel">
            <div class="message-stream" id="messageStream">
                <!-- 欢迎消息 -->
                <div class="msg narrator">
                    <div class="msg-label">界说</div>
                    <div>正在唤醒意识……</div>
                </div>
            </div>

            <!-- 思考指示器 -->
            <div class="thinking-indicator" id="thinkingIndicator">
                <div class="thinking-dots"><span></span><span></span><span></span></div>
                <span>大脑正在思考…</span>
            </div>

            <!-- 输入区 -->
            <div class="input-bar">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="说点什么…" autocomplete="off" autofocus>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">按 Enter 发送</div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="side-panel" id="sidePanel">
            <div class="side-scroll">
                <!-- 场景 -->
                <div class="panel-card">
                    <div class="panel-card-title"><span class="icon">◈</span> 当前场景</div>
                    <div class="scene-display" id="panelScene">—</div>
                    <div class="scene-time" id="panelTime"></div>
                </div>

                <!-- 驱动力 -->
                <div class="panel-card">
                    <div class="panel-card-title"><span class="icon">◉</span> 驱动力</div>
                    <div id="drivesContainer">
                        <div style="font-size:12px;color:var(--text-muted)">加载中…</div>
                    </div>
                </div>

                <!-- 最后思绪 -->
                <div class="panel-card">
                    <div class="panel-card-title"><span class="icon">◌</span> 最后思绪</div>
                    <div class="last-thought" id="lastThought">—</div>
                </div>

                <!-- 场景对象 -->
                <div class="panel-card">
                    <div class="panel-card-title"><span class="icon">◍</span> 场景对象</div>
                    <div class="world-list" id="worldObjects">加载中…</div>
                    <div class="world-changes" id="worldChanges"></div>
                </div>

                <!-- 状态 -->
                <div class="panel-card">
                    <div class="panel-card-title"><span class="icon">◎</span> 状态</div>
                    <div class="status-row">
                        <span class="status-dot-sm" id="statusDot"></span>
                        <span id="statusText">连接中…</span>
                    </div>
                    <div class="status-row">
                        <span style="color:var(--text-muted)">用户在场：</span>
                        <span id="userPresentText">否</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    (() => {
        'use strict';

        // ── DOM ──
        const messageStream = document.getElementById('messageStream');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const thinkingIndicator = document.getElementById('thinkingIndicator');

        // ── 状态 ──
        let lastMsgCount = 0;
        let isSending = false;
        let panelVisible = true;

        // ── 驱动力颜色映射 ──
        const driveColors = [
            'var(--accent-purple)',
            'var(--accent-blue)',
            'var(--accent-green)',
            'var(--accent-amber)',
            'var(--accent-rose)',
            '#818cf8',
            '#f472b6',
            '#38bdf8',
        ];

        // ── 工具函数 ──
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                messageStream.scrollTop = messageStream.scrollHeight;
            });
        }

        // ── 面板切换 ──
        window.togglePanel = function() {
            const panel = document.getElementById('sidePanel');
            panelVisible = !panelVisible;
            panel.classList.toggle('collapsed', !panelVisible);
        };

        // ── 渲染消息 ──
        function renderMessages(conversation) {
            messageStream.innerHTML = '';
            for (const msg of conversation) {
                appendMessage(msg.type, msg.content, msg.time);
            }
            scrollToBottom();
        }

        function appendMessage(type, content, time) {
            const el = document.createElement('div');
            el.className = `msg ${type}`;

            const labels = {
                user: '你',
                brain: '大脑',
                narrator: '界说',
                thought: '内心独白',
            };

            const label = labels[type] || type;
            const timeStr = time || new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const htmlContent = escapeHtml(content).replace(/\n/g, '<br>');

            el.innerHTML = `
                <div class="msg-label">${label}</div>
                <div>${htmlContent}</div>
                <div class="msg-time">${timeStr}</div>
            `;
            messageStream.appendChild(el);
        }

        // ── 驱动力渲染 ──
        function renderDrives(drives) {
            const container = document.getElementById('drivesContainer');
            if (!drives || Object.keys(drives).length === 0) {
                container.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">暂无数据</div>';
                return;
            }

            const entries = Object.entries(drives);
            let html = '';
            entries.forEach(([name, value], i) => {
                const color = driveColors[i % driveColors.length];
                const displayVal = Math.max(-100, Math.min(100, value));
                // 将 -100~100 映射到 0~100% 显示
                const percent = Math.round((displayVal + 100) / 2);
                html += `
                    <div class="drive-item">
                        <div class="drive-header">
                            <span class="drive-name">${escapeHtml(name)}</span>
                            <span class="drive-value">${displayVal}</span>
                        </div>
                        <div class="drive-track">
                            <div class="drive-fill" style="width:${percent}%;background:${color}"></div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderWorldStatus(world) {
            const objectsEl = document.getElementById('worldObjects');
            const changesEl = document.getElementById('worldChanges');
            const objects = world?.objects || [];
            const changes = world?.recent_changes || [];

            if (!objects.length) {
                objectsEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">暂无对象状态</div>';
            } else {
                objectsEl.innerHTML = objects.slice(0, 8).map((obj) => {
                    const name = escapeHtml(obj.name || obj.id || 'unknown');
                    const state = obj.state ? escapeHtml(String(obj.state)) : '';
                    const position = obj.position ? escapeHtml(String(obj.position)) : '';
                    const meta = [state, position].filter(Boolean).join(' · ');
                    return `
                        <div class="world-row">
                            <span class="name">${name}</span>
                            <span class="meta">${meta || '—'}</span>
                        </div>
                    `;
                }).join('');
            }

            if (!changes.length) {
                changesEl.textContent = '';
            } else {
                changesEl.innerHTML = changes.slice(-4).map((item) => {
                    const op = escapeHtml(item.op || 'update');
                    const id = escapeHtml(item.id || 'unknown');
                    return `• ${op} ${id}`;
                }).join('<br>');
            }
        }

        // ── 状态更新 ──
        function updateStatus(data) {
            if (!data || data.error) return;

            // 场景
            const scene = data.brain?.scene || '未知';
            document.getElementById('sceneDisplay').textContent = scene;
            document.getElementById('panelScene').textContent = scene;

            // 时间
            const now = new Date();
            document.getElementById('panelTime').textContent =
                now.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

            // 驱动力
            renderDrives(data.brain?.drives);

            // 场景对象
            renderWorldStatus(data.world);

            // 最后思绪
            const thought = data.brain?.last_thought;
            document.getElementById('lastThought').textContent = thought || '—';

            // 状态
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            dot.className = 'status-dot-sm online';
            statusText.textContent = '运行中';

            // 用户在场
            document.getElementById('userPresentText').textContent =
                data.brain?.user_present ? '是' : '否';
        }

        // ── 发送消息 ──
        window.sendMessage = async function() {
            const text = userInput.value.trim();
            if (!text || isSending) return;

            isSending = true;
            sendBtn.disabled = true;
            userInput.value = '';

            // 立即显示用户消息
            appendMessage('user', text);
            scrollToBottom();

            // 显示思考指示器
            thinkingIndicator.classList.add('active');

            try {
                const resp = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const result = await resp.json();
                if (result.error) {
                    appendMessage('narrator', `⚠ ${result.error}`);
                }
                // 刷新对话
                await refreshAll();
            } catch (e) {
                appendMessage('narrator', '⚠ 网络错误，请重试');
                console.error(e);
            } finally {
                thinkingIndicator.classList.remove('active');
                isSending = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        };

        // ── 刷新全部 ──
        async function refreshAll() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                if (data.error) return;

                const conversation = data.conversation || [];
                if (conversation.length !== lastMsgCount) {
                    renderMessages(conversation);
                    lastMsgCount = conversation.length;
                }
                updateStatus(data);
            } catch (e) {
                console.error('刷新失败:', e);
                document.getElementById('statusDot').className = 'status-dot-sm offline';
                document.getElementById('statusText').textContent = '连接断开';
            }
        }

        // ── 触发思考 ──
        async function triggerThink() {
            try {
                const resp = await fetch('/api/think');
                const data = await resp.json();
                if (data.status === 'ok') {
                    await refreshAll();
                }
            } catch (e) {
                // 静默失败
            }
        }

        // ── 事件绑定 ──
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── 定时任务 ──
        // 思考轮询（每 8 秒触发一次 tick）
        setInterval(triggerThink, 8000);
        // 状态刷新（每 4 秒）
        setInterval(refreshAll, 4000);

        // ── 初始化 ──
        setTimeout(async () => {
            await triggerThink();
            await refreshAll();
        }, 800);

    })();
    </script>
</body>
</html>
